name: iOS Build

on:
  push:
    branches: [ci/ios-build]
  pull_request:
    branches: [ci/ios-build]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (device)
    runs-on: macos-latest  # macOS 15 ARM64, Xcode 16

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false

      # ── Go ────────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go/go.sum

      # ── Node / Yarn ────────────────────────────────────────────────────────
      # Node must be set up before CocoaPods — Podfile uses `node --print` to
      # resolve react-native and expo paths.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      # ── Ruby / Fastlane ───────────────────────────────────────────────────
      # Fastlane is used for signed IPA builds (TestFlight/App Store).
      # The Gemfile lives in shared/ios/. bundler-cache speeds up subsequent runs.
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: shared/ios

      # ── Cache node_modules ─────────────────────────────────────────────────
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: shared/node_modules
          key: node-modules-ios-${{ hashFiles('shared/yarn.lock') }}
          restore-keys: node-modules-ios-

      # ── Cache CocoaPods ────────────────────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: shared/ios/Pods
          key: pods-${{ hashFiles('shared/ios/Podfile.lock') }}
          restore-keys: pods-

      # ── GOPATH layout ─────────────────────────────────────────────────────
      - name: Configure GOPATH layout
        run: |
          mkdir -p ~/work/src/github.com/keybase
          ln -sf "$GITHUB_WORKSPACE" ~/work/src/github.com/keybase/client
          echo "GOPATH=$HOME/work" >> $GITHUB_ENV

      # ── Build Go mobile framework (keybasego.xcframework) ─────────────────
      # gomobile bind compiles the Go bind package into an XCFramework for iOS.
      # Output: shared/ios/keybasego.xcframework (consumed by Xcode).
      # GOPATH is available here from $GITHUB_ENV set in the previous step.
      - name: Build gomobile (iOS XCFramework)
        env:
          KEYBASE_BUILD: ${{ github.run_number }}
          DEST_DIR: ${{ github.workspace }}/shared/ios
        run: |
          export PATH="$GOPATH/bin:$PATH"
          bash shared/react-native/gobuild.sh ios

      # ── JS dependencies ───────────────────────────────────────────────────
      - name: Install JS dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: shared
        run: yarn install --pure-lockfile --ignore-optional --ignore-scripts

      # Node 20 babel shim — hooks Module._extensions for .tsx/.ts to
      # pre-transpile to CommonJS. node_modules/.bin on PATH for patch-package etc.
      - name: Write babel shim
        working-directory: shared
        run: |
          cat > yarn-runner.js << 'SHIMEOF'
          const babel  = require("@babel/core");
          const Module = require("module");
          const fs     = require("fs");
          const OPTS = {
            presets: [
              ["@babel/preset-env", { targets: { node: "current" }, modules: "commonjs" }],
              ["@babel/preset-typescript"],
            ],
            sourceType: "module",
            caller: { name: "@babel/node" },
          };
          function hook(ext) {
            Module._extensions[ext] = function(m, filename) {
              const src    = fs.readFileSync(filename, "utf8");
              const result = babel.transformSync(src, { ...OPTS, filename });
              m._compile(result.code, filename);
            };
          }
          hook(".tsx");
          hook(".ts");
          require("./desktop/yarn-helper/index.tsx");
          SHIMEOF

      - name: Run postinstall
        working-directory: shared
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          node yarn-runner.js postinstall

      # ── CocoaPods ─────────────────────────────────────────────────────────
      - name: Install CocoaPods
        working-directory: shared/ios
        run: pod install --repo-update

      # ── Import signing certificate & provisioning profile ─────────────────
      # Certificate: exported from Keychain as .p12, base64-encoded
      # Profile: wildcard .mobileprovision, base64-encoded
      # Both stored as GitHub Actions secrets.
      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"
          # Extract UUID and install
          UUID=$(security cms -D -i "$PP_PATH" \
            | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV

      # ── Xcode build (device, signed) ───────────────────────────────────────
      # Builds for generic/platform=iOS (real device, arm64).
      # Uses the imported wildcard cert + provisioning profile.
      - name: Build (device, signed)
        working-directory: shared/ios
        run: |
          xcodebuild \
            -workspace Keybase.xcworkspace \
            -scheme Keybase \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ~/DerivedData \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      # ── Package IPA ────────────────────────────────────────────────────────
      - name: Package IPA
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -r ~/DerivedData/Build/Products/Release-iphoneos/Keybase.app \
            /tmp/ipa/Payload/
          cd /tmp/ipa
          zip -r Keybase.ipa Payload/
          echo "IPA_PATH=/tmp/ipa/Keybase.ipa" >> $GITHUB_ENV

      # ── Upload IPA artifact ────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keybase-iOS-Device
          path: /tmp/ipa/Keybase.ipa
          if-no-files-found: error
          retention-days: 14

      # ── TestFlight (disabled until App Store Connect is configured) ────────
      # Remove the `if: ${{ false }}` and add secrets to enable:
      #   APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID,
      #   APP_STORE_CONNECT_KEY (base64-encoded .p8)
      - name: Upload to TestFlight
        if: ${{ false }}
        working-directory: shared/ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
        run: bundle exec fastlane beta
